{% extends 'base.html' %}
{% block content %}
<div class="chat-shell {% if theme == 'salary' %}theme-salary{% elif theme == 'absence' %}theme-absence{% elif theme == 'entry' %}theme-entry{% endif %}">
    <div class="chat-header">{{ title }}</div>
    <div class="chat-body">
        {% if messages %}
            {% for msg in messages %}
                <div class="message {{ msg.role }}">
                    <div class="bubble">{{ msg.content }}</div>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty">您好，這是{{ title }}專區，請直接輸入您的問題。</div>
        {% endif %}
    </div>

    <form method="post" class="chat-form">
        {% csrf_token %}
        <input type="text" name="question" placeholder="輸入你的問題..." required>
        <button type="submit">送出</button>
    </form>
</div>
{% endblock %}

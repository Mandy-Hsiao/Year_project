<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聊天機器人介面</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <style>
    body { background: #f8f9fa; }
    .chat-container { max-width: 760px; margin: 32px auto; }
    .chat-box { min-height: 420px; max-height: 520px; overflow-y: auto; background: #fff; border-radius: 16px; border: 1px solid #dee2e6; padding: 20px; }
    .message { margin-bottom: 16px; }
    .message .bubble { display: inline-block; padding: 14px 18px; border-radius: 18px; line-height: 1.5; }
    .message.user .bubble { background: #0d6efd; color: #fff; border-bottom-right-radius: 4px; }
    .message.bot .bubble { background: #e9ecef; color: #212529; border-bottom-left-radius: 4px; }
    .message.user { text-align: right; }
    .message.bot { text-align: left; }
    .footer-note { font-size: 0.9rem; color: #6c757d; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="text-center mb-4">
      <h1 class="h3">簡易聊天機器人</h1>
      <p class="text-secondary">在下面輸入內容，按送出開始對話。</p>
    </div>

    <div id="chatBox" class="chat-box shadow-sm"></div>

    <form id="chatForm" class="mt-3 d-flex gap-2">
      <input id="messageInput" class="form-control" type="text" placeholder="輸入你的訊息..." autocomplete="off" />
      <button class="btn btn-primary" type="submit">送出</button>
    </form>

    <p class="footer-note mt-3">提示：你可以問「你好」、「天氣」或「再見」。</p>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');

    function appendMessage(text, role) {
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      messageEl.appendChild(bubble);
      chatBox.appendChild(messageEl);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage(text) {
      appendMessage(text, 'user');
      messageInput.value = '';
      messageInput.focus();

      const response = await fetch('/api/chat/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ message: text })
      });

      const data = await response.json();
      appendMessage(data.reply || '發生錯誤，請重新嘗試。', 'bot');
    }

    chatForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;
      sendMessage(text);
    });

    appendMessage('你好！這是你的聊天機器人介面。請輸入訊息開始。', 'bot');
  </script>
</body>
</html>

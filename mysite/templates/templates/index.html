<!DOCTYPE html>
<html lang="zh-Hant">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一個 Django 前端網頁</title>
    <style>
        body {

    <div class="card">
        <h1>👋 哈囉！這是我製作的前端網頁</h1>

</html>
